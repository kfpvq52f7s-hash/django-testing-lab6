{% extends 'base.html' %}

{% block title %}Список пользователей{% endblock %}

{% block content %}
<h2>Все пользователи</h2>

<ul>
    {% for u in users %}
        <li>
            <strong>{{ u.username }}</strong>
            {% if u.avatar %}
                <img src="{{ u.avatar.url }}" width="30" height="30" style="border-radius: 50%;">
            {% endif %}
            <a href="{% url 'profile' u.username %}">→ Профиль</a>
        </li>
    {% empty %}
        <li>Нет других пользователей</li>
    {% endfor %}
</ul>

<a href="{% url 'home' %}"><button>🏠 На главную</button></a>
{% endblock %}
